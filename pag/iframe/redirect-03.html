<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuitNow Payment QR</title>
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            background-color: #f4f4f9; 
            font-family: -apple-system, sans-serif;
        }
        .payment-container { width: 90%; max-width: 400px; text-align: center; }
        .qr-card { 
            background: #fff; 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid #eee; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
        }
        #qr-code-image { 
            width: 250px; 
            height: 250px; 
            margin: 20px auto; 
            display: none; 
            border: 8px solid #f8f8f8;
            border-radius: 8px;
        }
        .timer-display { 
            font-size: 32px; 
            font-weight: bold; 
            color: #d9534f; 
            margin: 15px 0; 
            font-family: monospace; 
        }
        .btn-check { 
            margin-top: 20px; 
            padding: 14px; 
            background: #000; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold;
            font-size: 16px;
        }
        #error-msg { color: #d9534f; display: none; padding: 20px; background: #fff; border-radius: 8px; }
        .ref-text { font-size: 12px; color: #aaa; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="payment-container">
        <h1 style="margin-bottom: 20px;">DuitNow QR</h1>
        
        <div id="error-msg">
            <strong>Error:</strong> QR Data missing or expired.<br>
            Please go back and try again.
        </div>

        <div class="qr-card" id="qr-section" style="display: none;">
            <p style="margin: 0; color: #555;">Scan to pay with your banking app</p>
            
            <img id="qr-code-image" src="" alt="DuitNow QR">
            
            <div id="countdown-display" class="timer-display">00:00</div>
            
            <button class="btn-check" onclick="triggerInquiry()">Check Status Now</button>
            <p id="inquiry-status-text" style="font-size: 14px; color: #007bff; margin-top: 10px;"></p>
            
            <p class="ref-text">Ref: <span id="ref-id"></span></p>
        </div>
    </div>

    <form id="inq-form" method="post" action="https://linkv2.paydee.co/mpigw/mpReq" target="inq_frame" style="display:none;">
        <input type="hidden" name="MPI_RETURN_URL" value="https://sys-int-nine.vercel.app/api/callback">
        <input type="hidden" name="MPI_TRANS_TYPE" value="INQ">
        <input type="hidden" name="MPI_MERC_ID" value="000000000000006">
        <input type="hidden" name="MPI_PURCH_DATE" id="INQ_PURCH_DATE">
        <input type="hidden" name="MPI_TRXN_ID" id="INQ_TRXN_ID">
        <input type="hidden" name="MPI_ORI_TRXN_ID" id="INQ_ORI_TRXN_ID">
        <input type="hidden" name="MPI_PURCH_CURR" value="458">
        <input type="hidden" name="MPI_PURCH_AMT" id="INQ_PURCH_AMT">
        <textarea name="MPI_MAC" id="INQ_MAC"></textarea>
    </form>
    <iframe name="inq_frame" style="display:none;"></iframe>

    <script src="inquiry-handler.js"></script>

    <script>
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            
            let qrRaw = params.get('MPI_QR_CODE');
            const expiry = params.get('MPI_QR_EXPIRY_SECONDS');
            const trxnId = params.get('MPI_TRXN_ID');

            if (qrRaw) {
                // IMPORTANT: Fix the URL-safe encoding manually
                // 1. Decode URL encoding (%2B -> +)
                // 2. Replace spaces with + (browser artifact)
                let cleanBase64 = decodeURIComponent(qrRaw).replace(/ /g, '+');

                const qrImg = document.getElementById('qr-code-image');
                qrImg.src = "data:image/png;base64," + cleanBase64;
                
                qrImg.onload = function() {
                    document.getElementById('qr-section').style.display = "block";
                    qrImg.style.display = "block";
                };

                document.getElementById('ref-id').textContent = trxnId || 'N/A';

                if (expiry) {
                    startTimer(parseInt(expiry));
                }
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        };

        function startTimer(seconds) {
            let timer = seconds;
            const display = document.getElementById('countdown-display');
            const interval = setInterval(() => {
                let m = Math.floor(timer / 60).toString().padStart(2, '0');
                let s = (timer % 60).toString().padStart(2, '0');
                display.textContent = `${m}:${s}`;
                
                if (--timer < 0) {
                    clearInterval(interval);
                    display.textContent = "EXPIRED";
                    document.getElementById('qr-code-image').style.opacity = "0.2";
                }
            }, 1000);
        }
    </script>
</body>
</html>
